name: hackdeepwikireader
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.8.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Networking: REST calls to a connected HackDeepWiki backend, and this
  # app's own direct connections to LLM providers (lib/llm/) -- no
  # WebSocket, chat never proxies through a HackDeepWiki server.
  http: ^1.2.2

  # dart:ffi calls into native/zstddeclib.c (bundled per-platform, see
  # lib/native/zstd_native.dart) to decompress .zim clusters -- almost all
  # modern .zim archives use zstd, and there's no pure-Dart zstd decoder.
  ffi: ^2.1.3

  # Content rendering.
  flutter_markdown_plus: ^1.0.3
  # Syntax-highlighted code blocks inside wiki page Markdown, matching the
  # web app's react-syntax-highlighter treatment (see
  # lib/widgets/wiki_markdown_view.dart's custom `pre` builder).
  flutter_highlight: ^0.7.0
  # Direct dependency (not just transitive via flutter_markdown_plus) --
  # lib/widgets/wiki_markdown_view.dart imports `markdown`'s Element type
  # for its custom `pre` builder.
  markdown: ^7.3.0
  graphview: ^1.2.0
  # .zim entry rendering (lib/widgets/zim_html_view.dart, zim_webview.dart):
  # flutter_html is the fallback everywhere no real WebView plugin exists.
  # It has no CSS/table engine
  # anywhere close to a real browser's, so complex real-world .zim HTML
  # (e.g. full Wikipedia dumps, with heavy infobox tables/CSS) renders best-
  # effort there, not pixel-correct -- see zim_webview.dart for the
  # Android/Linux/Windows path, which uses a real browser engine instead.
  flutter_html: ^3.0.0
  # Real browser engine for .zim rendering on Android -- WebView-based, so
  # full CSS/table support instead of flutter_html's subset. Points at
  # lib/zim/zim_local_server.dart's loopback HTTP server, never the network.
  webview_flutter: ^4.13.1
  # Already a transitive dependency of webview_flutter on Android; declared
  # directly because zim_webview.dart casts to AndroidWebViewController for
  # setUseWideViewPort -- a generic, content-agnostic WebView setting (not
  # per-.zim logic) for archives whose own responsive breakpoints assume a
  # wider screen than an actual phone's, confirmed live to matter.
  webview_flutter_android: ^4.10.1
  # Linux uses WebKitGTK inside a GtkOverlay prepared by the native runner
  # before Flutter's GL view is realized. This keeps full browser layout
  # without WPE's broken DMA-BUF path or late GL-view reparenting.
  webview_all_linux:
    path: third_party/webview_all_linux
  # Same idea for Windows (WebView2/Edge) -- a different package because
  # webview_flutter itself has no Windows implementation.
  webview_windows: ^0.4.0

  # Local storage: saved endpoints, imported bundle library, chat history.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Opening a .hdwreader bundle (a zip) and picking files from disk.
  archive: ^3.6.1
  file_picker: ^8.1.3

  # State management -- kept deliberately simple (ChangeNotifier + Provider)
  # so new screens/features are cheap to add without a code-gen step.
  provider: ^6.1.2

  # Typography matching the web app's "Cyberpunk Hacker" theme.
  google_fonts: ^6.2.1

  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

  # Generates Android (legacy + adaptive) and Windows app icons from
  # assets/icon/hackdeepwiki.png -- the same launcher icon HackDeepWiki
  # itself uses (deepwiki-open/public/hackdeepwiki.png), so the reader app
  # is visually recognizable as its companion. Linux has no equivalent tool
  # (flutter_launcher_icons doesn't support it); its window icon is set
  # directly from the same asset in linux/runner/my_application.cc.
  flutter_launcher_icons: ^0.14.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter_launcher_icons:
  image_path: "assets/icon/hackdeepwiki.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: "assets/icon/hackdeepwiki.png"
  windows:
    generate: true
    image_path: "assets/icon/hackdeepwiki.png"
    icon_size: 256

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/icon/hackdeepwiki.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
