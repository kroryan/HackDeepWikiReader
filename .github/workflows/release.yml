name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    # WebKitGTK 4.1 is the Linux ZIM browser engine.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Verify source and local ZIM reader
        run: |
          flutter analyze
          flutter test

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release
          tar -czf HackDeepWikiReader-linux-x64.tar.gz bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackdeepwikireader-linux
          path: build/linux/x64/release/HackDeepWikiReader-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows bundle
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath HackDeepWikiReader-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackdeepwikireader-windows
          path: HackDeepWikiReader-windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      # Debug APK (not release): the release buildType in
      # android/app/build.gradle.kts wires a signing config that, without a
      # real Play Store upload keystore in repo secrets, was breaking the
      # Android job (and took the whole release down because publish-release
      # depends on it). A debug APK builds with Android's default debug
      # signing -- no keystore setup, no secrets, still installs fine -- so
      # the continuous pre-release always ships an installable Android build.
      # (No AAB either: the Play Store bundle build was the other new step
      # that broke; drop it until real publishing is wired up.)
      - name: Build APK debug
        run: flutter build apk --debug

      - name: Rename outputs
        run: cp build/app/outputs/flutter-apk/app-debug.apk HackDeepWikiReader.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackdeepwikireader-android
          path: HackDeepWikiReader.apk

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-android]
    # Run even if a platform build failed -- a continuous dev pre-release
    # should ship whatever compiled, not nothing. (Downloads below tolerate
    # a missing artifact, and the release step doesn't fail on unmatched
    # files, so one broken platform doesn't sink the whole release.)
    if: ${{ !cancelled() }}
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: hackdeepwikireader-linux
          path: ./artifacts
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: hackdeepwikireader-windows
          path: ./artifacts
        continue-on-error: true

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: hackdeepwikireader-android
          path: ./artifacts
        continue-on-error: true

      - name: Setup environment for Release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RELEASE_NAME=Release ${{ github.ref_name }}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "TAG_NAME=pre-release" >> $GITHUB_ENV
            echo "RELEASE_NAME=Latest Pre-release (Development Build)" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          draft: false
          fail_on_unmatched_files: false
          files: |
            ./artifacts/HackDeepWikiReader-linux-x64.tar.gz
            ./artifacts/HackDeepWikiReader-windows-x64.zip
            ./artifacts/HackDeepWikiReader.apk
          body: |
            Automatic pre-release builds of HackDeepWikiReader.

            - Built from branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Built at: ${{ github.event.head_commit.timestamp || 'N/A' }}

            ### Downloads
            - **Linux**: `HackDeepWikiReader-linux-x64.tar.gz` (extract and run `bundle/hackdeepwikireader`)
            - **Windows**: `HackDeepWikiReader-windows-x64.zip` (extract and run `hackdeepwikireader.exe`)
            - **Android**: `HackDeepWikiReader.apk` (enable "install from unknown sources" if prompted)

            *A read-only client for HackDeepWiki -- import and chat with `.zim` archives locally, open `.hdwreader` bundles fully offline, or optionally connect to a HackDeepWiki server.*
